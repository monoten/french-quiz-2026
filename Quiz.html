// ============================================================
// PERSISTENCE
// ============================================================
function loadJSON(key, fallback) {
  try {
    const s = localStorage.getItem(key);
    return s ? JSON.parse(s) : fallback;
  } catch (e) {
    return fallback;
  }
}
function saveJSON(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { /* ignore */ }
}
function loadHistory() { return loadJSON(LS_KEY_HISTORY, []); }
function saveHistory(h) { saveJSON(LS_KEY_HISTORY, h); }
function loadPerf() { return loadJSON(LS_KEY_PERF, {}); }
function savePerf(p) { saveJSON(LS_KEY_PERF, p); }
function loadSettings() { return loadJSON(LS_KEY_SETTINGS, null); }
function saveSettings(s) { saveJSON(LS_KEY_SETTINGS, s); }

function updatePerf(wordId, direction, correct) {
  const perf = loadPerf();
  const key = wordId + ':' + direction;
  if (!perf[key]) perf[key] = { attempts: 0, wrong: 0, recentWrong: 0 };
  perf[key].attempts++;
  if (correct) {
    perf[key].recentWrong = Math.max(0, perf[key].recentWrong - 1);
  } else {
    perf[key].wrong++;
    perf[key].recentWrong = Math.min(5, perf[key].recentWrong + 1);
  }
  perf[key].lastTime = Date.now();
  savePerf(perf);
}

function getWordWeight(wordId, direction) {
  const perf = loadPerf();
  const key = wordId + ':' + direction;
  const p = perf[key];
  if (!p) return 1.0; // unseen
  // leech-weighted: each recent wrong adds weight
  return 1.0 + p.recentWrong * 1.5;
}

// ============================================================
// MATCHING
// ============================================================
function normalize(s) {
  if (s == null) return '';
  return String(s).toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[?!.,;:]+/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function stripLeadingArticle(s) {
  // s is already normalized (lowercase). Returns version without leading
  // article (FR: le/la/les/l'/un/une/des; NL: de/het/een), or null if none.
  const patterns = [/^l['‛]\s*/, /^les\s+/, /^le\s+/, /^la\s+/, /^une?\s+/, /^des\s+/, /^de\s+/, /^het\s+/, /^een\s+/];
  for (const p of patterns) {
    if (p.test(s)) return s.replace(p, '').trim();
  }
  return null;
}

function getAcceptedAnswers(answer, articlesOptional) {
  const variants = new Set();
  variants.add(normalize(answer));

  // Split on slash (used like "ik kan/ik mag")
  if (answer.includes('/')) {
    answer.split('/').forEach(a => variants.add(normalize(a.trim())));
  }

  // Split on comma (used like "het meisje, de dochter")
  const parts = answer.split(',').map(p => p.trim());
  for (const part of parts) {
    variants.add(normalize(part));

    // Short parenthetical suffix: Grand(e), Petit(e), Quel(le)
    const m1 = part.match(/^(.+?)\(([a-zA-Zàâäéèêëîïôöûüç]{1,3})\)$/i);
    if (m1) {
      variants.add(normalize(m1[1].trim()));
      variants.add(normalize((m1[1] + m1[2]).trim()));
    }

    // Longer parenthetical (informational, e.g. "(le truc)" or "(= difficile)")
    const m2 = part.match(/^(.+?)\s*\(([^)]+)\)\s*(.*)$/);
    if (m2) {
      const stripped = (m2[1] + ' ' + m2[3]).replace(/\s+/g, ' ').trim();
      variants.add(normalize(stripped));
    }
  }

  // If articles are optional, also accept article-stripped versions
  if (articlesOptional) {
    const additional = [];
    for (const v of variants) {
      const noArt = stripLeadingArticle(v);
      if (noArt) additional.push(noArt);
    }
    additional.forEach(a => variants.add(a));
  }

  variants.delete('');
  return [...variants];
}

function isCorrect(userAnswer, correctAnswer, articlesOptional) {
  if (!userAnswer || !userAnswer.trim()) return false;
  const accepted = getAcceptedAnswers(correctAnswer, articlesOptional);
  return accepted.includes(normalize(userAnswer));
}

// QUESTION GENERATION
// ============================================================
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function weightedSample(pool, count) {
  // Pool is [{word, weight, direction}], sample without replacement
  const items = pool.slice();
  const chosen = [];
  while (chosen.length < count && items.length > 0) {
    const totalWeight = items.reduce((s, it) => s + it.weight, 0);
    let r = Math.random() * totalWeight;
    let idx = 0;
    for (let i = 0; i < items.length; i++) {
      r -= items[i].weight;
      if (r <= 0) { idx = i; break; }
    }
    chosen.push(items[idx]);
    items.splice(idx, 1);
  }
  return chosen;
}

function filterWords(config) {
  let pool = WORDS.slice();
  if (config.deck === 'core') pool = pool.filter(w => w.d === 'C');
  else if (config.deck === 'recog') pool = pool.filter(w => w.d === 'R');
  if (config.themes.length > 0) pool = pool.filter(w => config.themes.includes(w.t16));
  return pool;
}

function buildQuestions(config) {
  const pool = filterWords(config);
  // Expand into pool with direction
  const expanded = [];
  for (const w of pool) {
    if (w.d === 'C') {
      // Bidirectional — directions according to config
      if (config.direction === 'fr-nl' || config.direction === 'mixed') {
        expanded.push({ word: w, direction: 'fr-nl' });
      }
      if (config.direction === 'nl-fr' || config.direction === 'mixed') {
        expanded.push({ word: w, direction: 'nl-fr' });
      }
    } else {
      // Recognition — always FR→NL
      expanded.push({ word: w, direction: 'fr-nl' });
    }
  }
  // Assign weights (adaptive/leech-weighted)
  const weighted = expanded.map(item => ({
    ...item,
    weight: getWordWeight(item.word.id, item.direction)
  }));
  // Sample
  const n = config.count === 'all' ? weighted.length : Math.min(parseInt(config.count, 10), weighted.length);
  const sampled = weightedSample(weighted, n);

  // Build questions
  return sampled.map(item => {
    const isFRtoNL = item.direction === 'fr-nl';
    return {
      word: item.word,
      direction: item.direction,
      prompt: isFRtoNL ? item.word.fr : item.word.nl,
      promptHint: isFRtoNL ? item.word.frHint : null,
      expected: isFRtoNL ? item.word.nl : item.word.fr,
      mcOptions: null // built lazily
    };
  });
}

function generateMCOptions(question) {
  const correct = question.expected;
  const word = question.word;
  const isFRtoNL = question.direction === 'fr-nl';
  // Same-theme pool first
  let pool = WORDS.filter(w => w.t16 === word.t16 && w.id !== word.id)
    .map(w => isFRtoNL ? w.nl : w.fr);
  // Dedupe vs correct
  const normCorrect = normalize(correct);
  pool = pool.filter(p => normalize(p) !== normCorrect);
  // If not enough, pad from full set
  if (pool.length < 3) {
    const extras = WORDS.filter(w => w.id !== word.id).map(w => isFRtoNL ? w.nl : w.fr);
    for (const e of extras) {
      if (pool.length >= 12) break;
      if (normalize(e) !== normCorrect && !pool.some(p => normalize(p) === normalize(e))) pool.push(e);
    }
  }
  const distractors = shuffle(pool).slice(0, 3);
  return shuffle([correct, ...distractors]);
}

// ============================================================
// CSV
// ============================================================
function csvEscape(s) {
  if (s == null) return '';
  const str = String(s);
  if (str.includes(',') || str.includes('"') || str.includes('\n')) {
    return '"' + str.replace(/"/g, '""') + '"';
  }
  return str;
}

function generateCSV(records) {
  const headers = ['timestamp','word_id','french','dutch','direction','your_answer','correct','theme','deck'];
  const rows = [headers.join(',')];
  for (const r of records) {
    rows.push([
      csvEscape(r.timestamp),
      csvEscape(r.word_id),
      csvEscape(r.french),
      csvEscape(r.dutch),
      csvEscape(r.direction),
      csvEscape(r.your_answer),
      csvEscape(r.correct),
      csvEscape(r.theme),
      csvEscape(r.deck)
    ].join(','));
  }
  return rows.join('\n');
}

function downloadCSV(content, filename) {
  const blob = new Blob([content], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

// ============================================================
// HEADER STATS
// ============================================================
function updateHeaderStats() {
  const hist = loadHistory();
  const el = document.getElementById('header-stats');
  if (hist.length === 0) { el.textContent = ''; return; }
  const sessions = new Set(hist.map(r => r.session_id)).size;
  const correct = hist.filter(r => r.correct === 1).length;
  const pct = Math.round((correct / hist.length) * 100);
  el.textContent = `${sessions} session${sessions === 1 ? '' : 's'} · ${pct}% avg`;
}

// ============================================================
// SCREENS
// ============================================================
const app = document.getElementById('app');

function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const k in attrs) {
    if (k === 'class') e.className = attrs[k];
    else if (k === 'onclick') e.onclick = attrs[k];
    else if (k === 'oninput') e.oninput = attrs[k];
    else if (k === 'onkeydown') e.onkeydown = attrs[k];
    else if (k === 'style') Object.assign(e.style, attrs[k]);
    else if (k.startsWith('on')) e.addEventListener(k.slice(2), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  for (const c of children) {
    if (c == null) continue;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

function clear() { app.innerHTML = ''; }

function showStart() {
  state.screen = 'start';
  state.results = [];
  state.questions = [];
  state.currentIndex = 0;
  clear();

  // restore last settings if any
  const saved = loadSettings();
  if (saved) Object.assign(state.config, saved);

  const cfg = state.config;

  // Count words in scope for live preview
  const updateScopeCount = () => {
    const filtered = filterWords(cfg);
    const coreCount = filtered.filter(w => w.d === 'C').length;
    const recogCount = filtered.filter(w => w.d === 'R').length;
    let qPool = 0;
    if (cfg.deck === 'core' || cfg.deck === 'both') {
      qPool += coreCount * (cfg.direction === 'mixed' ? 2 : 1);
    }
    if (cfg.deck === 'recog' || cfg.deck === 'both') {
      qPool += recogCount;
    }
    document.getElementById('scope-info').innerHTML =
      `<strong>${filtered.length}</strong> words in scope · <strong>${qPool}</strong> possible questions` +
      (filtered.length === 0 ? ' — <span style="color:#b22a2a">pick at least one theme</span>' : '');
  };

  // Theme chips
  const themeChips = el('div', { class: 'chip-group' });
  const allChip = el('div', {
    class: 'chip' + (cfg.themes.length === 0 ? ' active' : ''),
    onclick: () => { cfg.themes = []; saveSettings(cfg); showStart(); }
  }, 'All themes');
  themeChips.appendChild(allChip);
  for (let t = 1; t <= 16; t++) {
    const count = WORDS.filter(w => w.t16 === t).length;
    const chip = el('div', {
      class: 'chip' + (cfg.themes.includes(t) ? ' active' : ''),
      onclick: () => {
        if (cfg.themes.includes(t)) cfg.themes = cfg.themes.filter(x => x !== t);
        else cfg.themes = [...cfg.themes, t];
        saveSettings(cfg);
        showStart();
      }
    }, `${t}. ${THEMES[t]}`, el('span', { class: 'chip-count' }, String(count)));
    themeChips.appendChild(chip);
  }

  // Deck radios
  const deckGroup = el('div', { class: 'radio-group' });
  for (const opt of [['both','Both decks'],['core','Core only (⇄)'],['recog','Recognition only (→)']]) {
    deckGroup.appendChild(el('div', {
      class: 'radio' + (cfg.deck === opt[0] ? ' active' : ''),
      onclick: () => { cfg.deck = opt[0]; saveSettings(cfg); showStart(); }
    }, opt[1]));
  }

  // Direction radios (only meaningful when Core is in scope)
  const dirGroup = el('div', { class: 'radio-group' });
  for (const opt of [['mixed','Mixed (random)'],['fr-nl','FR → NL only'],['nl-fr','NL → FR only']]) {
    dirGroup.appendChild(el('div', {
      class: 'radio' + (cfg.direction === opt[0] ? ' active' : ''),
      onclick: () => { cfg.direction = opt[0]; saveSettings(cfg); showStart(); }
    }, opt[1]));
  }

  // Mode radios
  const modeGroup = el('div', { class: 'radio-group' });
  for (const opt of [['typing','Typing'],['mc','Multiple choice']]) {
    modeGroup.appendChild(el('div', {
      class: 'radio' + (cfg.mode === opt[0] ? ' active' : ''),
      onclick: () => { cfg.mode = opt[0]; saveSettings(cfg); showStart(); }
    }, opt[1]));
  }

  // Articles radios (affects typing-mode matching)
  const articlesGroup = el('div', { class: 'radio-group' });
  for (const opt of [[true, 'Required (test-realistic)'], [false, 'Optional (forgiving)']]) {
    articlesGroup.appendChild(el('div', {
      class: 'radio' + (cfg.articlesRequired === opt[0] ? ' active' : ''),
      onclick: () => { cfg.articlesRequired = opt[0]; saveSettings(cfg); showStart(); }
    }, opt[1]));
  }

  // Count radios
  const countGroup = el('div', { class: 'radio-group' });
  for (const n of [10, 20, 30, 50, 'all']) {
    countGroup.appendChild(el('div', {
      class: 'radio' + (String(cfg.count) === String(n) ? ' active' : ''),
      onclick: () => { cfg.count = n; saveSettings(cfg); showStart(); }
    }, n === 'all' ? 'All in scope' : String(n)));
  }

  const card = el('div', { class: 'card' },
    el('h1', {}, 'Quiz setup'),
    el('p', { class: 'muted' }, 'Pick your filters below. The quiz will choose words from this scope, leech-weighted (recently-missed words come back more often).'),

    el('h2', {}, 'Themes ', el('span', { class: 'small muted' }, '(click to select; multi-select)')),
    themeChips,

    el('h2', {}, 'Deck'),
    deckGroup,

    el('h2', {}, 'Direction ', el('span', { class: 'small muted' }, '(applies to Core deck only)')),
    dirGroup,

    el('h2', {}, 'Answer mode'),
    modeGroup,

    el('h2', {}, 'Articles ', el('span', { class: 'small muted' }, '(le/la/de/het for nouns — typing mode only)')),
    articlesGroup,

    el('h2', {}, 'Length'),
    countGroup,

    el('div', { class: 'scope-info', id: 'scope-info' }),

    el('div', { style: { marginTop: '20px', textAlign: 'right' } },
      el('button', { class: 'primary', onclick: startQuiz, id: 'start-btn' }, 'Start quiz →')
    )
  );
  app.appendChild(card);

  // History summary
  const hist = loadHistory();
  if (hist.length > 0) {
    const sessions = {};
    hist.forEach(r => { sessions[r.session_id] = sessions[r.session_id] || []; sessions[r.session_id].push(r); });
    const sessionList = Object.values(sessions).sort((a,b) => new Date(b[0].timestamp) - new Date(a[0].timestamp)).slice(0, 5);
    const histCard = el('div', { class: 'card' },
      el('h2', { style: { marginTop: 0 } }, 'Recent sessions'),
      ...sessionList.map(s => {
        const correct = s.filter(r => r.correct === 1).length;
        const total = s.length;
        const pct = Math.round((correct / total) * 100);
        const date = new Date(s[0].timestamp);
        const dateStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return el('div', { class: 'breakdown-row', style: { fontSize: '13.5px' } },
          el('span', {}, dateStr),
          el('span', {}, `${correct}/${total} (${pct}%)`)
        );
      }),
      el('div', { class: 'download-row' },
        el('button', { class: 'secondary', onclick: () => {
          const csv = generateCSV(hist);
          downloadCSV(csv, `vocab_quiz_history_${new Date().toISOString().slice(0,10)}.csv`);
        }}, 'Download full history (CSV)'),
        el('button', { class: 'secondary', onclick: () => {
          if (confirm('Clear all history? This cannot be undone.')) {
            saveHistory([]); savePerf({}); updateHeaderStats(); showStart();
          }
        }}, 'Clear history')
      )
    );
    app.appendChild(histCard);
  }

  updateScopeCount();
  document.getElementById('start-btn').disabled = filterWords(cfg).length === 0;
}

function startQuiz() {
  state.questions = buildQuestions(state.config);
  if (state.questions.length === 0) { alert('No words match your filters. Pick at least one theme.'); return; }
  state.currentIndex = 0;
  state.results = [];
  state.sessionId = 's_' + Date.now() + '_' + Math.floor(Math.random()*1000);
  state.sessionStart = Date.now();
  showQuestion();
}

function showQuestion() {
  state.screen = 'question';
  clear();
  const q = state.questions[state.currentIndex];
  const total = state.questions.length;
  const correctSoFar = state.results.filter(r => r.correct === 1).length;
  const directionLabel = q.direction === 'fr-nl' ? 'French → Dutch' : 'Dutch → French';
  const themeName = THEMES[q.word.t16];
  const deckTag = el('span', { class: 'deck-tag ' + (q.word.d === 'C' ? 'core' : 'recog') },
    q.word.d === 'C' ? 'Core ⇄' : 'Recognition →');

  const card = el('div', { class: 'card' });
  card.appendChild(el('div', { class: 'progress' },
    el('span', {}, `Q ${state.currentIndex + 1} / ${total}`),
    el('div', { class: 'progress-bar' },
      el('div', { class: 'progress-bar-fill', style: { width: ((state.currentIndex / total) * 100) + '%' } })
    ),
    el('span', {}, `Score ${correctSoFar} / ${state.currentIndex}`)
  ));
  card.appendChild(el('div', {},
    el('span', { class: 'theme-tag' }, themeName),
    deckTag
  ));

  card.appendChild(el('div', { class: 'prompt' },
    el('div', { class: 'direction-label' }, directionLabel),
    el('div', { class: 'word' }, q.prompt),
    q.promptHint ? el('div', { class: 'hint' }, q.promptHint) : null
  ));

  if (state.config.mode === 'mc') {
    if (!q.mcOptions) q.mcOptions = generateMCOptions(q);
    const mcGrid = el('div', { class: 'mc-options', id: 'mc-grid' });
    q.mcOptions.forEach((opt, i) => {
      mcGrid.appendChild(el('button', {
        class: 'mc-option',
        'data-opt': opt,
        onclick: () => submitMC(opt, i)
      }, opt));
    });
    card.appendChild(mcGrid);
  } else {
    const input = el('input', { type: 'text', id: 'answer-input', autocomplete: 'off', autocapitalize: 'none', spellcheck: 'false',
      onkeydown: (e) => { if (e.key === 'Enter') submitTyping(); }
    });
    card.appendChild(el('div', { class: 'input-row' },
      input,
      el('button', { onclick: submitTyping }, 'Submit')
    ));
    card.appendChild(el('div', { class: 'keyboard-hint' }, 'Press Enter to submit · accents not required · capitalisation ignored'));
  }
  app.appendChild(card);
  setTimeout(() => {
    const inp = document.getElementById('answer-input');
    if (inp) inp.focus();
  }, 30);
}

function submitTyping() {
  const inp = document.getElementById('answer-input');
  if (!inp) return;
  const userAnswer = inp.value.trim();
  if (!userAnswer) return;
  const q = state.questions[state.currentIndex];
  const articlesOpt = !state.config.articlesRequired;
  const correct = isCorrect(userAnswer, q.expected, articlesOpt);
  recordResult(q, userAnswer, correct);
  showFeedback(userAnswer, correct);
}

function submitMC(option, idx) {
  const q = state.questions[state.currentIndex];
  const articlesOpt = !state.config.articlesRequired;
  const correct = isCorrect(option, q.expected, articlesOpt);
  recordResult(q, option, correct);
  // Visual feedback on MC buttons
  document.querySelectorAll('#mc-grid .mc-option').forEach(btn => {
    btn.disabled = true;
    const val = btn.getAttribute('data-opt');
    if (isCorrect(val, q.expected, articlesOpt)) btn.classList.add('show-right');
    else if (val === option) btn.classList.add('chose-wrong');
  });
  setTimeout(() => showFeedback(option, correct, true), 700);
}

function recordResult(q, userAnswer, correct) {
  const record = {
    session_id: state.sessionId,
    timestamp: new Date().toISOString(),
    word_id: q.word.id,
    french: q.word.fr,
    dutch: q.word.nl,
    direction: q.direction,
    your_answer: userAnswer,
    correct: correct ? 1 : 0,
    theme: THEMES[q.word.t16],
    deck: q.word.d === 'C' ? 'Core' : 'Recognition'
  };
  state.results.push(record);
  // append to history
  const hist = loadHistory();
  hist.push(record);
  saveHistory(hist);
  // update perf for leech tracking
  updatePerf(q.word.id, q.direction, correct);
  updateHeaderStats();
}

function showFeedback(userAnswer, correct, skipMC) {
  const q = state.questions[state.currentIndex];
  const card = document.querySelector('.card');
  // Disable the input area
  const inp = document.getElementById('answer-input');
  if (inp) inp.disabled = true;
  // Remove any existing submit/feedback below input
  const existingButtons = card.querySelectorAll('.input-row button');
  existingButtons.forEach(b => b.disabled = true);
  const kbHint = card.querySelector('.keyboard-hint');
  if (kbHint) kbHint.remove();

  const feedback = el('div', { class: 'feedback ' + (correct ? 'correct' : 'wrong') });
  feedback.appendChild(el('div', { class: 'verdict' }, correct ? '✓ Correct' : '✗ Not quite'));
  if (correct) {
    feedback.appendChild(el('div', { class: 'answer' }, `${q.word.fr}  =  ${q.word.nl}`));
  } else {
    feedback.appendChild(el('div', { class: 'answer' },
      el('strong', {}, 'You answered: '), userAnswer || '(blank)', el('br'),
      el('strong', {}, 'Correct: '), q.expected
    ));
  }
  // Always show pronunciation + english bridge for learning
  if (q.word.ph || q.word.en) {
    const extra = el('div', { class: 'extra' });
    if (q.word.ph) extra.appendChild(el('span', {}, `[${q.word.ph}] · `));
    if (q.word.en) extra.appendChild(el('span', {}, q.word.en));
    feedback.appendChild(extra);
  }
  card.appendChild(feedback);

  const buttonRow = el('div', { class: 'button-row' },
    el('button', { class: 'primary', id: 'next-btn', onclick: nextQuestion },
      state.currentIndex + 1 < state.questions.length ? 'Next →' : 'See results →')
  );
  card.appendChild(buttonRow);
  setTimeout(() => {
    const nb = document.getElementById('next-btn');
    if (nb) nb.focus();
  }, 30);
  document.addEventListener('keydown', enterToAdvance);
}

function enterToAdvance(e) {
  if (e.key === 'Enter') {
    document.removeEventListener('keydown', enterToAdvance);
    nextQuestion();
  }
}

function nextQuestion() {
  document.removeEventListener('keydown', enterToAdvance);
  state.currentIndex++;
  if (state.currentIndex >= state.questions.length) showResults();
  else showQuestion();
}

function showResults() {
  state.screen = 'result';
  clear();
  const total = state.results.length;
  const correct = state.results.filter(r => r.correct === 1).length;
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
  const pctClass = pct >= 80 ? 'good' : pct < 50 ? 'bad' : '';

  // Per-theme breakdown
  const byTheme = {};
  state.results.forEach(r => {
    if (!byTheme[r.theme]) byTheme[r.theme] = { c: 0, t: 0 };
    byTheme[r.theme].t++;
    if (r.correct === 1) byTheme[r.theme].c++;
  });
  const themeRows = Object.entries(byTheme).map(([theme, s]) =>
    el('div', { class: 'breakdown-row' }, el('span', {}, theme), el('span', {}, `${s.c} / ${s.t}`))
  );

  // Per-direction breakdown
  const byDir = { 'fr-nl': { c: 0, t: 0 }, 'nl-fr': { c: 0, t: 0 } };
  state.results.forEach(r => {
    byDir[r.direction].t++;
    if (r.correct === 1) byDir[r.direction].c++;
  });
  const dirRows = [];
  if (byDir['fr-nl'].t > 0) dirRows.push(el('div', { class: 'breakdown-row' },
    el('span', {}, 'French → Dutch'), el('span', {}, `${byDir['fr-nl'].c} / ${byDir['fr-nl'].t}`)));
  if (byDir['nl-fr'].t > 0) dirRows.push(el('div', { class: 'breakdown-row' },
    el('span', {}, 'Dutch → French'), el('span', {}, `${byDir['nl-fr'].c} / ${byDir['nl-fr'].t}`)));

  // Missed words
  const missed = state.results.filter(r => r.correct === 0);
  const missedList = el('ul', { class: 'missed-list', style: { paddingLeft: '20px', listStyle: 'disc' } });
  missed.forEach(r => missedList.appendChild(
    el('li', {},
      el('span', { class: 'miss-fr' }, r.french),
      ' → ',
      el('span', { class: 'miss-nl' }, r.dutch),
      r.your_answer ? el('span', { style: { color: '#888' } }, ` (you wrote: ${r.your_answer})`) : null
    )
  ));

  const card = el('div', { class: 'card' },
    el('h1', {}, 'Results'),
    el('div', { class: 'results-summary' },
      el('div', { class: 'pct ' + pctClass }, pct + '%'),
      el('div', { class: 'total' }, `${correct} correct out of ${total}`)
    )
  );

  if (themeRows.length > 0) {
    card.appendChild(el('div', { class: 'breakdown' },
      el('h3', {}, 'By theme'),
      ...themeRows
    ));
  }
  if (dirRows.length > 0) {
    card.appendChild(el('div', { class: 'breakdown' },
      el('h3', {}, 'By direction'),
      ...dirRows
    ));
  }
  if (missed.length > 0) {
    card.appendChild(el('div', { class: 'breakdown' },
      el('h3', {}, 'Words missed (' + missed.length + ')'),
      missedList
    ));
  }

  card.appendChild(el('div', { class: 'download-row' },
    el('button', { onclick: () => {
      const csv = generateCSV(state.results);
      const ts = new Date().toISOString().slice(0,16).replace(/[:T]/g, '-');
      downloadCSV(csv, `vocab_quiz_session_${ts}.csv`);
    }}, '⬇ Download this session (CSV)'),
    el('button', { onclick: () => {
      const csv = generateCSV(loadHistory());
      const ts = new Date().toISOString().slice(0,10);
      downloadCSV(csv, `vocab_quiz_history_${ts}.csv`);
    }}, '⬇ Download full history (CSV)')
  ));
  card.appendChild(el('div', { style: { marginTop: '14px' } },
    el('button', { class: 'primary', onclick: showStart }, '↻ Another quiz')
  ));

  app.appendChild(card);
}

// ============================================================
// INIT
// ============================================================
updateHeaderStats();
showStart();
</script>
